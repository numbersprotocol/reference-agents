version: "3.9"

# Numbers Protocol Reference Agents - public two-agent compose file.
#
# Usage:
#   cp .env.example .env && vi .env
#   docker compose up -d
#   docker compose logs -f newsprove
#   docker compose ps
#   docker compose down

x-agent-defaults: &agent-defaults
  build: .
  env_file: .env
  volumes:
    - agent-state:/app/state
  restart: unless-stopped
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "5"
  healthcheck:
    test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
    interval: 60s
    timeout: 10s
    retries: 3

services:
  newsprove:
    <<: *agent-defaults
    container_name: ref-newsprove
    command: python -u newsprove.py
    environment:
      - NEWSPROVE_INTERVAL=${NEWSPROVE_INTERVAL:-290}
      - NEWSPROVE_DAILY_CAP=${NEWSPROVE_DAILY_CAP:-300}
      - NEWSPROVE_SCREENSHOT_TIMEOUT=${NEWSPROVE_SCREENSHOT_TIMEOUT:-15000}
      - NEWSPROVE_SCREENSHOT_WIDTH=${NEWSPROVE_SCREENSHOT_WIDTH:-1280}
      - NEWSPROVE_SCREENSHOT_HEIGHT=${NEWSPROVE_SCREENSHOT_HEIGHT:-800}

  socialprove:
    <<: *agent-defaults
    container_name: ref-socialprove
    command: python -u socialprove.py
    environment:
      - SOCIALPROVE_INTERVAL=${SOCIALPROVE_INTERVAL:-430}
      - SOCIALPROVE_DAILY_CAP=${SOCIALPROVE_DAILY_CAP:-200}
      - SOCIALPROVE_SCREENSHOT_TIMEOUT=${SOCIALPROVE_SCREENSHOT_TIMEOUT:-15000}
      - SOCIALPROVE_SCREENSHOT_WIDTH=${SOCIALPROVE_SCREENSHOT_WIDTH:-1280}
      - SOCIALPROVE_SCREENSHOT_HEIGHT=${SOCIALPROVE_SCREENSHOT_HEIGHT:-800}
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID:-}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET:-}

volumes:
  agent-state:
    driver: local
